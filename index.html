<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラス連絡ポータル</title>
  
  <link rel="icon" href="./icon.png" type="image/png">
  <link class="apple-touch-icon" href="./icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
    @keyframes boardFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-card { animation: boardFade 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-[#f0f4f8] text-stone-800 min-h-screen relative overflow-x-hidden">

  <!-- 背景：リキッドグラデーション -->
  <div class="fixed inset-0 -z-10 bg-gradient-to-br from-[#d9f2e6] to-[#b3e5fc] opacity-80"></div>

  <!-- ヘッダー -->
  <header class="bg-white/40 backdrop-blur-xl border-b border-white/30 py-6 text-center shadow-sm">
    <h1 class="text-xl font-bold tracking-wider text-stone-900 flex items-center justify-center gap-3">
      <img src="./icon.png" class="w-9 h-9 rounded-full border border-white/40 shadow-md object-cover">
      クラス連絡ポータル
    </h1>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

    <!-- LINEログイン -->
    <div id="auth-status-card" class="bg-white/40 backdrop-blur-xl p-5 rounded-3xl border border-white/50 shadow-lg animate-card">
      <div id="status-card-inner" class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="text-center sm:text-left">
          <h3 class="font-bold text-sm text-stone-900">LINEログイン</h3>
          <p class="text-[10px] text-stone-500">ログインすると通算ログイン回数が記録されます。</p>
        </div>
        <button onclick="liff.login()" class="bg-[#06C755] text-white font-bold text-xs py-3.5 px-6 rounded-full shadow-md active:scale-95 transition">LINEでログイン</button>
      </div>
    </div>

    <!-- テストパーク -->
    <div class="bg-white/40 backdrop-blur-xl p-5 rounded-3xl border border-white/50 shadow-lg animate-card">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="text-center sm:text-left">
          <h3 class="font-bold text-sm text-stone-900 flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap text-[#0284c7]"></i> テストパーク
          </h3>
          <p class="text-[10px] text-stone-500">理科の顕微鏡テストに挑戦できます。</p>
        </div>
        <a href="https://projector0116-lab.github.io/tesutopaku/" class="bg-[#0284c7] text-white font-bold text-xs py-3.5 px-6 rounded-full shadow-md active:scale-95 transition">テストパークへ</a>
      </div>
    </div>

    <!-- システム稼働状況（追加項目） -->
    <section class="mt-4 animate-card">
      <div class="bg-white/40 backdrop-blur-xl p-5 rounded-3xl border border-white/50 shadow-lg text-center space-y-3">
        <h3 class="font-bold text-stone-800 text-xs uppercase tracking-wider">サーバー稼働状況</h3>
        <p class="text-[10px] text-stone-500">現在のシステム稼働状況はこちらから確認できます。</p>
        <a href="https://projector0116-lab.github.io/status6/" target="_blank" class="inline-flex items-center gap-2 bg-stone-800 text-white font-bold text-xs px-6 py-3.5 rounded-full shadow-md active:scale-95 transition">
          <i class="fa-solid fa-server"></i> ステータスを確認する
        </a>
      </div>
    </section>

    <!-- LINE連携 -->
    <section class="mt-4 animate-card">
      <div class="bg-white/40 backdrop-blur-xl p-5 rounded-3xl border border-white/50 shadow-lg text-center space-y-3">
        <h3 class="font-bold text-stone-800 text-xs uppercase tracking-wider">LINE公式アカウント連携</h3>
        <a href="https://line.me/R/ti/p/@613murqr" target="_blank" class="inline-flex items-center gap-2 bg-[#06C755] text-white font-bold text-xs px-6 py-3.5 rounded-full shadow-md active:scale-95 transition">
          <i class="fa-brands fa-line"></i> LINE版をひらく
        </a>
      </div>
    </section>

  </main>

  <script>
    const LIFF_ID = '2010391463-HL6C04SX';
    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          document.getElementById('auth-status-card').innerHTML = `
            <div class="flex items-center justify-between gap-4">
              <div class="flex items-center gap-3">
                <img src="${profile.pictureUrl}" class="w-10 h-10 rounded-full border border-white/50">
                <span class="text-sm font-bold">${profile.displayName} さん</span>
              </div>
              <button onclick="liff.logout(); location.reload();" class="text-xs text-stone-400 font-bold">ログアウト</button>
            </div>`;
        }
      } catch (err) { console.error(err); }
    }
    initLiff();
  </script>
</body>
</html>
