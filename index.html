<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラス時間割 ＆ 掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .silhouette-icon { color: #1e293b; }
    @keyframes boardFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-card { animation: boardFade 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-[#f0f0f2] text-stone-800 min-h-screen relative overflow-x-hidden">

  <!-- 背景：リキッドグラス -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none select-none">
    <div class="absolute top-[8%] left-[5%] w-[400px] h-[400px] rounded-full bg-blue-300/40 blur-[90px]"></div>
    <div class="absolute bottom-[10%] right-[2%] w-[500px] h-[500px] rounded-full bg-amber-200/40 blur-[100px]"></div>
  </div>

  <!-- ヘッダー -->
  <header class="bg-white/15 backdrop-blur-xl border-b border-white/20 py-6 text-center shadow-sm">
    <h1 class="text-xl font-bold tracking-wider text-stone-900 flex items-center justify-center gap-3">
      <img src="./icon.png" alt="あらいさん" class="w-9 h-9 rounded-full border border-white/40 shadow-md object-cover">
      クラス連絡板 ＆ 時間割
    </h1>
    <p class="text-[10px] text-stone-500 mt-1 uppercase tracking-widest">Timetable & Bulletin Board</p>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

    <!-- ログインカード -->
    <div id="auth-status-card" class="bg-white/15 backdrop-blur-xl p-5 rounded-2xl border border-white/30 shadow-lg animate-card">
      <div id="status-card-inner" class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="text-center sm:text-left space-y-1">
          <h3 class="font-bold text-sm text-stone-900">LINEログイン</h3>
          <p class="text-xs text-stone-500">ログインするとアイコンが表示されます。</p>
        </div>
        <button onclick="loginWithLine()" class="w-full sm:w-auto bg-[#06C755] hover:bg-[#05b34c] text-white font-bold text-xs py-3.5 px-6 rounded-xl flex items-center justify-center gap-2 transition duration-200 active:scale-95 shadow-md shrink-0">
          <i class="fa-brands fa-line text-base"></i> LINEでログインする
        </button>
      </div>
    </div>
    
    <!-- 時間割操作バー -->
    <div class="flex justify-between items-center bg-white/15 backdrop-blur-xl p-4 rounded-2xl border border-white/30 shadow-lg animate-card">
      <h2 class="font-bold text-sm text-stone-800 flex items-center gap-2">
        <i class="fa-solid fa-calendar silhouette-icon"></i> 時間割
      </h2>
      <div class="inline-flex bg-white/10 backdrop-blur-sm p-1 rounded-lg border border-white/15 text-xs">
        <button id="btn-this-week" onclick="switchWeek('今週')" class="px-3 py-1.5 rounded-md font-bold transition bg-stone-900/70 text-white shadow-sm">今週</button>
        <button id="btn-last-week" onclick="switchWeek('先週')" class="px-3 py-1.5 rounded-md font-bold transition text-stone-600 hover:text-stone-800 ml-1">先週</button>
      </div>
    </div>

    <!-- 時間割表示 -->
    <div id="timetable-display" class="space-y-4">
      <p class="text-stone-400 italic text-center py-12">データを読み込み中...</p>
    </div>

    <!-- 履歴ボタン -->
    <div class="text-center pt-2 animate-card">
      <button onclick="openHistoryModal()" class="inline-flex items-center gap-2 bg-white/25 backdrop-blur-md border border-white/30 hover:bg-white/40 text-stone-850 font-bold text-xs px-6 py-3.5 rounded-xl shadow-lg transition active:scale-95">
        <i class="fa-solid fa-clock-rotate-left silhouette-icon"></i> 過去の連絡履歴を見る
      </button>
    </div>

    <!-- LINEリンク -->
    <section class="mt-4 animate-card">
      <div class="bg-white/15 backdrop-blur-xl p-6 rounded-2xl border border-white/30 shadow-lg text-center space-y-3">
        <h3 class="font-bold text-stone-800 text-xs uppercase tracking-wider flex items-center justify-center gap-2">
          <i class="fa-brands fa-line silhouette-icon text-lg"></i> LINE公式アカウント
        </h3>
        <a id="line-link" href="https://lin.ee/YBRpoGH" target="_blank" class="inline-flex items-center gap-2 bg-stone-900/70 hover:bg-stone-850/70 text-white font-bold text-xs px-6 py-3.5 rounded-xl shadow-md transition active:scale-95">
          <i class="fa-brands fa-line text-sm"></i> LINE版をひらく
        </a>
      </div>
    </section>

  </main>

  <!-- 履歴モーダル -->
  <div id="history-modal" style="display: none;" class="fixed inset-0 bg-stone-900/10 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="bg-white/25 backdrop-blur-2xl rounded-2xl w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl border border-white/40 overflow-hidden animate-card">
      <div class="bg-white/25 border-b border-white/20 px-5 py-4 flex items-center justify-between">
        <h3 class="font-bold text-stone-800 text-sm">過去の連絡履歴</h3>
        <button onclick="closeHistoryModal()" class="w-8 h-8 rounded-full hover:bg-white/20 flex items-center justify-center transition active:scale-90"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="bbs-container" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
      <div class="bg-white/25 border-t border-white/20 px-5 py-3 text-right">
        <button onclick="closeHistoryModal()" class="bg-stone-200/50 text-stone-800 font-bold text-xs px-4 py-2 rounded-lg">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    // 設定
    const LIFF_ID = '2010391463-HL6C045X';
    const SERVICE_ID = 'class1-3'; 
    const API_KEY = 'XBvrlGnCscCST3Pt6CApexkkbuRJNCG8ZCmq'; 

    let timetableData = {};
    let announcementsData = [];
    let currentWeek = '今週';

    function loginWithLine() {
      // 400エラー対策：現在のアドレスバーそのものを使ってリダイレクトURLを固定
      const redirectUri = window.location.origin + window.location.pathname;
      liff.login({ redirectUri: redirectUri });
    }

    function logoutWithLine() { liff.logout(); window.location.reload(); }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          handleLoggedIn();
        }
      } catch (err) {
        console.error(err);
      }
      init();
    }

    async function handleLoggedIn() {
      try {
        const profile = await liff.getProfile();
        let count = parseInt(localStorage.getItem('line_login_count') || '0', 10);
        if (!sessionStorage.getItem('logged_in_this_session')) {
          count += 1;
          localStorage.setItem('line_login_count', count.toString());
          sessionStorage.setItem('logged_in_this_session', 'true');
        }
        const statusCard = document.getElementById('auth-status-card');
        if (statusCard) {
          statusCard.innerHTML = `
            <div class="flex items-center justify-between gap-4 animate-card">
              <div class="flex items-center gap-4">
                <img src="${profile.pictureUrl || './icon.png'}" class="w-12 h-12 rounded-full border border-white/40 shadow-inner object-cover">
                <div><div class="text-[10px] text-stone-500 font-extrabold uppercase">ONLINE</div><div class="text-sm font-bold text-stone-900">${profile.displayName}</div></div>
              </div>
              <div class="flex flex-col items-end gap-1.5">
                <span class="text-xs text-stone-600 font-extrabold bg-white/20 px-3.5 py-1.5 rounded-full border border-white/25">ログイン ${count}回目</span>
                <button onclick="logoutWithLine()" class="text-[10px] text-stone-400 font-bold">ログアウト</button>
              </div>
            </div>`;
        }
      } catch (e) {}
    }

    function openHistoryModal() { document.getElementById('history-modal').style.display = 'flex'; document.body.classList.add('overflow-hidden'); }
    function closeHistoryModal() { document.getElementById('history-modal').style.display = 'none'; document.body.classList.remove('overflow-hidden'); }

    async function downloadImage(url, filename, btnElement) {
      if (!url) return;
      btnElement.style.transform = 'scale(0.85)';
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
      } catch (err) { window.open(url, '_blank'); }
      setTimeout(() => { btnElement.style.transform = ''; }, 300);
    }

    async function init() {
      const headers = { 'X-MICROCMS-API-KEY': API_KEY };
      try {
        const [timetableRes, announcementsRes] = await Promise.all([
          fetch(`https://${SERVICE_ID}.microcms.io/api/v1/timetable`, { headers }),
          fetch(`https://${SERVICE_ID}.microcms.io/api/v1/announcements`, { headers })
        ]);
        timetableData = await timetableRes.json();
        const annJson = await announcementsRes.json();
        announcementsData = annJson.contents || [];
        renderTimetable();
        renderBBS();
      } catch (error) {
        document.getElementById('timetable-display').innerHTML = `<p class="text-red-500 text-xs text-center">API接続エラー。キーを確認してください。</p>`;
      }
    }

    function renderTimetable() {
      const container = document.getElementById('timetable-display');
      container.innerHTML = '';
      const isThisWeek = (currentWeek === '今週');
      const imageUrl = isThisWeek ? timetableData.this_week_image?.url : timetableData.last_week_image?.url;
      const message = isThisWeek ? timetableData.this_week_message : timetableData.last_week_message;
      if (!imageUrl && !message) {
        container.innerHTML = `<div class="bg-white/15 backdrop-blur-xl border border-dashed border-stone-300 rounded-2xl p-12 text-center text-stone-400 shadow-sm"><i class="fa-solid fa-image silhouette-icon text-3xl mb-2 opacity-40"></i><p class="text-xs">時間割が未登録です</p></div>`;
        return;
      }
      let html = '';
      if (imageUrl) {
        html += `<div class="bg-white/15 backdrop-blur-xl rounded-2xl border border-white/30 p-2 shadow-lg relative overflow-hidden animate-card">
          <img src="${imageUrl}" class="w-full h-auto object-contain max-h-[500px] rounded-lg" onclick="window.open('${imageUrl}')">
          <button onclick="downloadImage('${imageUrl}', '${currentWeek}_時間割.png', this)" class="absolute bottom-4 right-4 bg-white/40 backdrop-blur-md border border-white/30 shadow-lg rounded-full w-10 h-10 flex items-center justify-center transition active:scale-90"><i class="fa-solid fa-arrow-down"></i></button>
        </div>`;
      }
      if (message) {
        html += `<div class="bg-white/15 backdrop-blur-xl border border-white/30 rounded-2xl p-5 shadow-lg animate-card"><p class="text-stone-700 text-sm whitespace-pre-wrap">${message}</p></div>`;
      }
      container.innerHTML = html;
    }

    function renderBBS() {
      const container = document.getElementById('bbs-container');
      container.innerHTML = '';
      if (!announcementsData.length) { container.innerHTML = '<p class="text-stone-400 text-center py-12 text-xs">お知らせはありません。</p>'; return; }
      announcementsData.forEach((ann) => {
        const dateStr = new Date(ann.publishedAt).toLocaleDateString('ja-JP');
        const card = document.createElement('div');
        card.className = "bg-white/20 backdrop-blur-xl p-5 rounded-xl border border-white/35 space-y-3 shadow-md animate-card";
        card.innerHTML = `<div class="flex justify-between border-b border-white/20 pb-2"><span class="text-[10px] font-bold text-stone-500 uppercase tracking-wider">掲示</span><span class="text-[10px] text-stone-400">${dateStr}</span></div><p class="text-stone-700 whitespace-pre-wrap text-xs">${ann.message || ''}</p>` + (ann.image ? `<div class="relative group mt-2"><img src="${ann.image.url}" class="rounded-lg max-h-64 object-contain mx-auto border border-white/20"><button onclick="downloadImage('${ann.image.url}', '添付画像.png', this)" class="absolute bottom-2 right-2 bg-white/50 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-arrow-down text-xs"></i></button></div>` : '');
        container.appendChild(card);
      });
    }

    function switchWeek(week) {
      currentWeek = week;
      document.getElementById('btn-this-week').className = week === '今週' ? "px-3 py-1.5 rounded-md font-bold transition bg-stone-900/70 text-white shadow-sm" : "px-3 py-1.5 rounded-md font-bold transition text-stone-600 ml-1";
      document.getElementById('btn-last-week').className = week === '先週' ? "px-3 py-1.5 rounded-md font-bold transition bg-stone-900/70 text-white shadow-sm" : "px-3 py-1.5 rounded-md font-bold transition text-stone-600 ml-1";
      renderTimetable();
    }

    initLiff();
  </script>
</body>
</html>
