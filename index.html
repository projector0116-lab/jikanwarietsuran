<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラス時間割 ＆ 掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- シルエットアイコン用のFontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* シルエットアイコンの色を「濃いグレー・黒」に固定 */
    .silhouette-icon {
      color: #1e293b; /* slate-800 */
    }
    @keyframes boardFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-card {
      animation: boardFade 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="bg-stone-100 text-stone-800 min-h-screen">

  <!-- ヘッダー（モノトーン・シルエットスタイル） -->
  <header class="bg-white border-b border-stone-300 py-6 text-center shadow-sm">
    <h1 class="text-xl font-bold tracking-wider text-stone-900 flex items-center justify-center gap-2">
      <i class="fa-solid fa-clipboard-list silhouette-icon"></i> クラス連絡板 ＆ 時間割
    </h1>
    <p class="text-[10px] text-stone-500 mt-1 uppercase tracking-widest">Timetable & Bulletin Board</p>
  </header>

  <!-- メインレイアウト -->
  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">
    
    <!-- 時間割上部バー -->
    <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-stone-200 shadow-sm animate-card">
      <h2 class="font-bold text-sm text-stone-800 flex items-center gap-2">
        <i class="fa-solid fa-calendar silhouette-icon"></i> 時間割の確認
      </h2>
      
      <!-- 切り替え用モノトーンボタン -->
      <div class="inline-flex bg-stone-100 p-1 rounded-lg border border-stone-200 text-xs">
        <button id="btn-this-week" onclick="switchWeek('今週')" class="px-3 py-1.5 rounded-md font-bold transition bg-stone-800 text-white shadow-sm">今週</button>
        <button id="btn-last-week" onclick="switchWeek('先週')" class="px-3 py-1.5 rounded-md font-bold transition text-stone-500 hover:text-stone-800">先週</button>
      </div>
    </div>

    <!-- 時間割画像 ＆ 付属メッセージ表示エリア -->
    <div id="timetable-display" class="space-y-4">
      <p class="text-stone-400 italic text-center py-12">データを読み込み中...</p>
    </div>

    <!-- 中段：過去の履歴をひらくボタン -->
    <div class="text-center pt-2 animate-card">
      <button onclick="openHistoryModal()" class="inline-flex items-center gap-2 bg-white border border-stone-300 hover:bg-stone-50 text-stone-800 font-bold text-xs px-6 py-3.5 rounded-lg shadow-sm transition duration-200 active:scale-95">
        <i class="fa-solid fa-clock-rotate-left silhouette-icon"></i> 過去の連絡履歴を見る
      </button>
    </div>

    <!-- 最下部：LINE版をひらくセクション -->
    <section class="mt-4 animate-card">
      <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm text-center space-y-3">
        <h3 class="font-bold text-stone-800 text-xs uppercase tracking-wider flex items-center justify-center gap-2">
          <i class="fa-brands fa-line silhouette-icon text-lg"></i> LINE公式アカウント連携
        </h3>
        <p class="text-xs text-stone-500 max-w-md mx-auto">
          LINEから時間割の自動応答機能や、最新のお知らせの通知を受け取りたい場合は、以下のボタンから公式アカウントにアクセスしてください。
        </p>
        <div class="pt-2">
          <!-- LINEを開くボタン -->
          <a id="line-link" href="#" target="_blank" class="inline-flex items-center gap-2 bg-stone-900 hover:bg-stone-850 text-white font-bold text-xs px-6 py-3.5 rounded-lg shadow-sm transition duration-200 active:scale-95">
            <i class="fa-brands fa-line text-sm"></i> LINE版をひらく
          </a>
        </div>
      </div>
    </section>

  </main>

  <!-- 過去の履歴モーダル -->
  <div id="history-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-stone-100 rounded-2xl w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl border border-stone-300 overflow-hidden animate-card">
      
      <!-- モーダルのヘッダー -->
      <div class="bg-white border-b border-stone-200 px-5 py-4 flex items-center justify-between">
        <h3 class="font-bold text-stone-800 text-sm flex items-center gap-2">
          <i class="fa-solid fa-clock-rotate-left silhouette-icon"></i> 過去の連絡履歴（掲示板）
        </h3>
        <!-- 閉じる（シルエットバツ印） -->
        <button onclick="closeHistoryModal()" class="w-8 h-8 rounded-full hover:bg-stone-100 flex items-center justify-center transition active:scale-90">
          <i class="fa-solid fa-xmark text-lg text-stone-600"></i>
        </button>
      </div>

      <!-- モーダルのコンテンツ部分 -->
      <div id="bbs-container" class="flex-1 overflow-y-auto p-5 space-y-4">
        <p class="text-stone-400 italic text-center py-12">データを読み込み中...</p>
      </div>

      <!-- モーダルのフッター -->
      <div class="bg-white border-t border-stone-200 px-5 py-3 text-right">
        <button onclick="closeHistoryModal()" class="bg-stone-200 hover:bg-stone-300 text-stone-800 font-bold text-xs px-4 py-2 rounded-lg transition active:scale-95">
          閉じる
        </button>
      </div>

    </div>
  </div>

  <script>
    // 指定されたGASのウェブアプリURLを埋め込み済み
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwiJeNwNmYoUgS90qwZdFXrIDtum802K3rJrGm1fEPr_aaum4Y5Q0ml1er9af2nm7J6GA/exec';

    // 提供されたLINE友だち追加URL
    const LINE_ACCOUNT_URL = 'https://lin.ee/YBRpoGH';

    let allData = { timetables: [], announcements: [] };
    let currentWeek = '今週';

    async function init() {
      document.getElementById('line-link').href = LINE_ACCOUNT_URL;

      try {
        const response = await fetch(GAS_API_URL);
        allData = await response.json();
        
        renderTimetable();
        renderBBS();
      } catch (error) {
        console.error('データ取得失敗:', error);
        document.getElementById('bbs-container').innerHTML = `
          <p class="text-red-500 text-center text-xs py-4">読み込みに失敗しました。</p>
        `;
      }
    }

    function renderTimetable() {
      const container = document.getElementById('timetable-display');
      container.innerHTML = '';

      const target = allData.timetables.find(item => item.Week === currentWeek);

      if (!target || (!target.ImageURL && !target.Message)) {
        container.innerHTML = `
          <div class="bg-white border border-dashed border-stone-300 rounded-xl p-12 text-center text-stone-400 animate-card shadow-sm">
            <i class="fa-solid fa-image silhouette-icon text-3xl mb-2 opacity-40"></i>
            <p class="text-xs">時間割画像が登録されていません</p>
          </div>`;
        return;
      }

      let html = '';

      if (target.ImageURL) {
        html += `
          <div class="bg-white rounded-xl border border-stone-200 p-2 shadow-sm animate-card">
            <img src="${target.ImageURL}" alt="${currentWeek}の時間割" class="w-full h-auto object-contain max-h-[500px] rounded-lg" onclick="window.open('${target.ImageURL}')">
          </div>`;
      }

      if (target.Message) {
        html += `
          <div class="bg-white border border-stone-200 rounded-xl p-5 shadow-sm animate-card">
            <div class="text-[10px] text-stone-400 mb-2 uppercase font-bold tracking-widest border-b border-stone-100 pb-1.5 flex items-center gap-1">
              <i class="fa-solid fa-pen-nib silhouette-icon text-xs"></i> 連絡事項
            </div>
            <p class="text-stone-700 text-sm whitespace-pre-wrap leading-relaxed">${target.Message}</p>
          </div>`;
      }

      container.innerHTML = html;
    }

    function renderBBS() {
      const container = document.getElementById('bbs-container');
      container.innerHTML = '';

      if (!allData.announcements || allData.announcements.length === 0) {
        container.innerHTML = '<p class="text-stone-400 italic text-center py-12 text-xs">新しい書き込みはありません。</p>';
        return;
      }

      allData.announcements.forEach((ann) => {
        if (!ann.Message && !ann.ImageURL) return;

        const card = document.createElement('div');
        card.className = "bg-white p-5 rounded-xl border border-stone-200 space-y-3 shadow-sm";
        
        let htmlContent = `
          <div class="flex items-center justify-between border-b border-stone-100 pb-2">
            <span class="text-[10px] font-bold text-stone-500 uppercase tracking-wider flex items-center gap-1">
              <i class="fa-solid fa-bell silhouette-icon text-xs"></i> 掲示
            </span>
            <span class="text-[10px] text-stone-400">${ann.Date || ''}</span>
          </div>
          <p class="text-stone-700 whitespace-pre-wrap text-xs leading-relaxed">${ann.Message || ''}</p>
        `;

        if (ann.ImageURL) {
          htmlContent += `
            <div class="overflow-hidden rounded-lg border border-stone-100 bg-stone-50 max-h-64 mt-2">
              <img src="${ann.ImageURL}" alt="添付画像" class="w-full h-full object-contain mx-auto hover:opacity-95 cursor-pointer" onclick="window.open('${ann.ImageURL}')">
            </div>
          `;
        }

        card.innerHTML = htmlContent;
        container.appendChild(card);
      });
    }

    function switchWeek(week) {
      currentWeek = week;
      const btnThis = document.getElementById('btn-this-week');
      const btnLast = document.getElementById('btn-last-week');

      if (week === '今週') {
        btnThis.className = "px-3 py-1.5 rounded-md font-bold transition bg-stone-800 text-white shadow-sm";
        btnLast.className = "px-3 py-1.5 rounded-md font-bold transition text-stone-500 hover:text-stone-800";
      } else {
        btnThis.className = "px-3 py-1.5 rounded-md font-bold transition text-stone-500 hover:text-stone-800";
        btnLast.className = "px-3 py-1.5 rounded-md font-bold transition bg-stone-800 text-white shadow-sm";
      }
      renderTimetable();
    }

    function openHistoryModal() {
      const modal = document.getElementById('history-modal');
      modal.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeHistoryModal() {
      const modal = document.getElementById('history-modal');
      modal.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    init();
  </script>
</body>
</html>
