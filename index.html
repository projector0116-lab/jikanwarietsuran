<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラス時間割 ＆ 掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- LINEログイン用のSDK読み込み -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- シルエットアイコン用のFontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* シルエットアイコンの色を「濃いグレー・黒」に固定 */
    .silhouette-icon {
      color: #1e293b; /* slate-800 */
    }
    @keyframes boardFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-card {
      animation: boardFade 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="bg-[#f0f0f2] text-stone-800 min-h-screen relative overflow-x-hidden">

  <!-- 【Liquid Glass】背景を透過してゆらめく液体グラデーション（色彩を少し鮮やかにして透明感を強調） -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none select-none">
    <div class="absolute top-[8%] left-[5%] w-[400px] h-[400px] rounded-full bg-blue-300/40 blur-[90px]"></div>
    <div class="absolute bottom-[10%] right-[2%] w-[500px] h-[500px] rounded-full bg-amber-200/40 blur-[100px]"></div>
  </div>

  <!-- ヘッダー（極限透明・オリジナルロゴ仕様） -->
  <header class="bg-white/15 backdrop-blur-xl border-b border-white/20 py-6 text-center shadow-sm">
    <h1 class="text-xl font-bold tracking-wider text-stone-900 flex items-center justify-center gap-3">
      <img src="./icon.png" alt="あらいさん" class="w-9 h-9 rounded-full border border-white/40 shadow-md object-cover select-none pointer-events-none">
      クラス連絡板 ＆ 時間割
    </h1>
    <p class="text-[10px] text-stone-500 mt-1 uppercase tracking-widest">Timetable & Bulletin Board</p>
  </header>

  <!-- メインレイアウト -->
  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

    <!-- 【LINEログインカード】 -->
    <div id="auth-status-card" class="bg-white/15 backdrop-blur-xl p-5 rounded-2xl border border-white/30 shadow-lg animate-card">
      <div id="status-card-inner" class="flex flex-col sm:flex-row items-center justify-between gap-4 animate-card">
        <div class="text-center sm:text-left space-y-1">
          <h3 class="font-bold text-sm text-stone-900">LINEログイン</h3>
          <p class="text-xs text-stone-500">ログインすると、これまでの通算ログイン回数がカウントされます。</p>
        </div>
        <button onclick="loginWithLine()" class="w-full sm:w-auto bg-[#06C755] hover:bg-[#05b34c] text-white font-bold text-xs py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition duration-200 active:scale-95 shadow-md shrink-0">
          <i class="fa-brands fa-line text-base"></i> LINEでログインする
        </button>
      </div>
    </div>
    
    <!-- 時間割上部バー -->
    <div class="flex justify-between items-center bg-white/15 backdrop-blur-xl p-4 rounded-2xl border border-white/30 shadow-lg animate-card">
      <h2 class="font-bold text-sm text-stone-800 flex items-center gap-2">
        <i class="fa-solid fa-calendar silhouette-icon"></i> 時間割の確認
      </h2>
      
      <!-- 切り替え用モノトーンボタン（半透明ガラスデザイン） -->
      <div class="inline-flex bg-white/10 backdrop-blur-sm p-1 rounded-lg border border-white/15 text-xs">
        <button id="btn-this-week" onclick="switchWeek('今週')" class="px-3 py-1.5 rounded-md font-bold transition bg-stone-900/70 border border-white/20 text-white shadow-sm">今週</button>
        <button id="btn-last-week" onclick="switchWeek('先週')" class="px-3 py-1.5 rounded-md font-bold transition text-stone-600 hover:text-stone-800">先週</button>
      </div>
    </div>

    <!-- 時間割画像 ＆ 付属メッセージ表示エリア -->
    <div id="timetable-display" class="space-y-4">
      <p class="text-stone-400 italic text-center py-12">データを読み込み中...</p>
    </div>

    <!-- 中段：過去の履歴をひらくボタン -->
    <div class="text-center pt-2 animate-card">
      <button onclick="openHistoryModal()" class="inline-flex items-center gap-2 bg-white/25 backdrop-blur-md border border-stone-300 hover:bg-white/40 text-stone-850 font-bold text-xs px-6 py-3.5 rounded-xl shadow-lg transition duration-200 active:scale-95">
        <i class="fa-solid fa-clock-rotate-left silhouette-icon"></i> 過去の連絡履歴を見る
      </button>
    </div>

    <!-- 最下部：LINE版をひらくセクション -->
    <section class="mt-4 animate-card">
      <div class="bg-white/15 backdrop-blur-xl p-6 rounded-2xl border border-white/30 shadow-lg text-center space-y-3">
        <h3 class="font-bold text-stone-800 text-xs uppercase tracking-wider flex items-center justify-center gap-2">
          <i class="fa-brands fa-line silhouette-icon text-lg"></i> LINE公式アカウント連携
        </h3>
        <p class="text-xs text-stone-500 max-w-md mx-auto">
          LINEから時間割の自動応答機能や、最新のお知らせの通知を受け取りたい場合は、以下のボタンから公式アカウントにアクセスしてください。
        </p>
        <div class="pt-2">
          <!-- LINEを開くボタン -->
          <a id="line-link" href="#" target="_blank" class="inline-flex items-center gap-2 bg-stone-900/70 hover:bg-stone-850/70 text-white font-bold text-xs px-6 py-3.5 rounded-xl shadow-md transition duration-200 active:scale-95">
            <i class="fa-brands fa-line text-sm"></i> LINE版をひらく
          </a>
        </div>
      </div>
    </section>

  </main>

  <!-- ログインカレンダーモーダル（リキッドグラス仕様） -->
  <div id="calendar-modal" style="display: none;" class="fixed inset-0 bg-stone-900/10 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="bg-white/25 backdrop-blur-2xl rounded-2xl w-full max-w-sm flex flex-col shadow-2xl border border-white/45 overflow-hidden animate-card">
      
      <!-- カレンダーのヘッダー -->
      <div class="bg-white/25 border-b border-white/20 px-5 py-4 flex items-center justify-between">
        <h3 class="font-bold text-stone-800 text-sm flex items-center gap-2.5">
          <i class="fa-solid fa-calendar-days silhouette-icon"></i> ログインカレンダー
        </h3>
        <button onclick="closeCalendarModal()" class="w-8 h-8 rounded-full hover:bg-white/20 flex items-center justify-center transition active:scale-90">
          <i class="fa-solid fa-xmark text-lg text-stone-600"></i>
        </button>
      </div>

      <!-- カレンダーコンテンツ部分 -->
      <div class="p-5 space-y-4">
        <div class="flex justify-between items-center px-1">
          <span id="calendar-title" class="font-extrabold text-sm text-stone-850">取得中...</span>
          <span class="text-[10px] text-emerald-600 font-extrabold bg-white/30 px-2.5 py-0.5 rounded border border-white/30 shadow-sm">スタンプカード</span>
        </div>

        <!-- 曜日 -->
        <div class="grid grid-cols-7 text-center text-[10px] font-bold text-stone-400 border-b border-white/20 pb-2">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>

        <!-- 日付グリッド -->
        <div id="calendar-grid" class="grid grid-cols-7 gap-y-1 text-center font-bold">
          <!-- JSでレンダリングします -->
        </div>
      </div>

      <!-- カレンダーのフッター -->
      <div class="bg-white/25 border-t border-white/20 px-5 py-3 text-right">
        <button onclick="closeCalendarModal()" class="bg-stone-200/50 hover:bg-stone-300/60 text-stone-800 font-bold text-xs px-4 py-2 rounded-lg transition active:scale-95">
          閉じる
        </button>
      </div>

    </div>
  </div>

  <!-- 過去の履歴モーダル -->
  <div id="history-modal" style="display: none;" class="fixed inset-0 bg-stone-900/10 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="bg-white/25 backdrop-blur-2xl rounded-2xl w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl border border-white/40 overflow-hidden animate-card">
      
      <!-- モーダルのヘッダー -->
      <div class="bg-white/25 border-b border-white/20 px-5 py-4 flex items-center justify-between">
        <h3 class="font-bold text-stone-800 text-sm flex items-center gap-2.5">
          <img src="./icon.png" alt="あらいさん" class="w-6 h-6 rounded-full border border-white/40 shadow-sm object-cover select-none pointer-events-none">
          過去の連絡履歴（掲示板）
        </h3>
        <button onclick="closeHistoryModal()" class="w-8 h-8 rounded-full hover:bg-white/20 flex items-center justify-center transition active:scale-90">
          <i class="fa-solid fa-xmark text-lg text-stone-600"></i>
        </button>
      </div>

      <!-- モーダルのコンテンツ部分 -->
      <div id="bbs-container" class="flex-1 overflow-y-auto p-5 space-y-4">
        <p class="text-stone-400 italic text-center py-12">データを読み込み中...</p>
      </div>

      <div class="bg-white/25 border-t border-white/20 px-5 py-3 text-right">
        <button onclick="closeHistoryModal()" class="bg-stone-200/50 hover:bg-stone-300/60 text-stone-800 font-bold text-xs px-4 py-2 rounded-lg transition active:scale-95">
          閉じる
        </button>
      </div>

    </div>
  </div>

  <script>
    // 【URL自動自己修復セキュリティ（本番環境のみ稼働・400エラーを自動で防ぎます）】
    if (window.location.origin === 'https://projector0116-lab.github.io') {
      if (window.location.pathname === '/jikanwarietsuran') {
        window.location.replace('https://projector0116-lab.github.io/jikanwarietsuran/');
      }
      if (window.location.pathname.endsWith('/index.html')) {
        const cleanPath = window.location.pathname.replace('/index.html', '/');
        window.location.replace(window.location.origin + cleanPath);
      }
    }

    // 正しいLIFF ID
    const LIFF_ID = '2010391463-HL6C04SX';

    const SERVICE_ID = 'class1-3'; 
    const API_KEY = 'XBvrlGnCscCST3Pt6CApexkkbuRJNCG8ZCmq'; 
    const LINE_ACCOUNT_URL = 'https://lin.ee/YBRpoGH';

    let timetableData = {};
    let announcementsData = [];
    let currentWeek = '今週';

    // LINEログイン処理
    function loginWithLine() {
      const redirectUri = window.location.origin + window.location.pathname;
      liff.login({ redirectUri: redirectUri });
    }

    // LINEログアウト処理
    function logoutWithLine() {
      liff.logout();
      window.location.reload(); 
    }

    async function initLiff() {
      if (!LIFF_ID || LIFF_ID === 'ここにコピーしたLIFF_IDを貼り付け') {
        const statusCard = document.getElementById('auth-status-card');
        if (statusCard) statusCard.style.display = 'none';
        init();
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          handleLoggedIn();
        } else {
          init();
        }
      } catch (err) {
        console.error('LIFF初期化失敗:', err);
        init();
      }
    }

    // ログインしている場合の表示
    async function handleLoggedIn() {
      try {
        const profile = await liff.getProfile();

        // 【一日一回ログイン＆回数記録処理】
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        let loginDates = JSON.parse(localStorage.getItem('line_login_dates') || '[]');
        
        // 今日まだログイン記録がなければ配列に追加して保存
        if (!loginDates.includes(todayStr)) {
          loginDates.push(todayStr);
          localStorage.setItem('line_login_dates', JSON.stringify(loginDates));
        }

        const count = loginDates.length; // 重複のない累計ログイン日数

        const statusCard = document.getElementById('auth-status-card');
        if (statusCard) {
          statusCard.innerHTML = `
            <div class="flex items-center justify-between gap-4 animate-card">
              <div class="flex items-center gap-4">
                <img src="${profile.pictureUrl || './icon.png'}" class="w-12 h-12 rounded-full border border-white/40 shadow-inner object-cover select-none">
                <div>
                  <div class="text-[10px] text-stone-500 font-extrabold uppercase tracking-widest">ログイン中</div>
                  <div class="text-sm font-bold text-stone-900">${profile.displayName} さん</div>
                </div>
              </div>
              <div class="flex flex-col items-end gap-1.5 shrink-0">
                <span class="text-xs text-stone-600 font-extrabold bg-white/20 px-3.5 py-1.5 rounded-full border border-white/25 shadow-sm">ログイン ${count}日目</span>
                <div class="flex items-center gap-2">
                  <button onclick="openCalendarModal()" class="text-[10px] text-blue-600 hover:text-blue-800 font-bold flex items-center gap-1 transition active:scale-95">
                    <i class="fa-solid fa-calendar-days"></i> カレンダー
                  </button>
                  <span class="text-stone-300 text-[10px]">|</span>
                  <button onclick="logoutWithLine()" class="text-[10px] text-stone-400 hover:text-stone-600 font-bold transition">ログアウト</button>
                </div>
              </div>
            </div>
          `;
        }

      } catch (e) {
        console.error('プロファイル取得失敗:', e);
      }

      init();
    }

    // ログインカレンダーのレンダリング
    function renderCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth(); 
      
      const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
      document.getElementById('calendar-title').innerText = `${year}年 ${monthNames[month]}`;

      const firstDayIndex = new Date(year, month, 1).getDay(); 
      const lastDay = new Date(year, month + 1, 0).getDate(); 

      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      // ローカルストレージからログイン日付リストを取得
      const loginDates = JSON.parse(localStorage.getItem('line_login_dates') || '[]');

      // 月初の余白セルをレンダリング
      for (let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = "py-2";
        grid.appendChild(emptyCell);
      }

      // 日付のレンダリング
      for (let day = 1; day <= lastDay; day++) {
        const cell = document.createElement('div');
        cell.className = "py-2 flex flex-col items-center justify-center relative select-none";
        
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasLoggedIn = loginDates.includes(dateStr);

        if (hasLoggedIn) {
          // ログイン日には美しいサークル（○）のスタンプを表示します
          cell.innerHTML = `
            <span class="text-xs font-bold text-stone-900 z-10">${day}</span>
            <div class="absolute w-7 h-7 rounded-full border-2 border-emerald-500/70 bg-emerald-500/10 flex items-center justify-center"></div>
          `;
        } else {
          cell.innerHTML = `
            <span class="text-xs text-stone-500">${day}</span>
          `;
        }
        grid.appendChild(cell);
      }
    }

    // カレンダーモーダルを開く
    function openCalendarModal() {
      const modal = document.getElementById('calendar-modal');
      if (modal) {
        renderCalendar();
        modal.style.display = 'flex';
        document.body.classList.add('overflow-hidden');
      }
    }

    // カレンダーモーダルを閉じる
    function closeCalendarModal() {
      const modal = document.getElementById('calendar-modal');
      if (modal) {
        modal.style.display = 'none';
        document.body.classList.remove('overflow-hidden');
      }
    }

    // ポップアップを開く
    function openHistoryModal() {
      const modal = document.getElementById('history-modal');
      if (modal) {
        modal.style.display = 'flex';
        document.body.classList.add('overflow-hidden');
      }
    }

    // ポップアップを閉じる
    function closeHistoryModal() {
      const modal = document.getElementById('history-modal');
      if (modal) {
        modal.style.display = 'none';
        document.body.classList.remove('overflow-hidden');
      }
    }

    // 画像保存処理
    async function downloadImage(url, filename, btnElement) {
      if (!url) return;
      
      btnElement.style.transform = 'scale(0.85)';
      const originalHtml = btnElement.innerHTML;
      btnElement.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin text-stone-800 text-sm"></i>`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error();
        const blob = await response.blob();
        
        const blobUrl = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = blobUrl;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(blobUrl);
      } catch (err) {
        window.open(url, '_blank');
      } finally {
        setTimeout(() => {
          btnElement.style.transform = '';
          btnElement.innerHTML = originalHtml;
        }, 300);
      }
    }

    async function init() {
      const headers = {
        'X-MICROCMS-API-KEY': API_KEY
      };

      try {
        const [timetableRes, announcementsRes] = await Promise.all([
          fetch(`https://${SERVICE_ID}.microcms.io/api/v1/timetable`, { headers }),
          fetch(`https://${SERVICE_ID}.microcms.io/api/v1/announcements`, { headers })
        ]);

        const timetableJson = await timetableRes.json();
        const annJson = await announcementsRes.json();

        timetableData = timetableJson || {};
        announcementsData = (annJson && annJson.contents) ? annJson.contents : [];
        
        renderTimetable();
        renderBBS();
      } catch (error) {
        console.error('データ取得失敗:', error);
        
        const display = document.getElementById('timetable-display');
        if (display) {
          display.innerHTML = `
            <div class="bg-red-50/50 backdrop-blur-md text-red-800 p-5 rounded-xl border border-red-200 text-xs animate-card">
              <strong class="font-bold text-sm block mb-2"><i class="fa-solid fa-triangle-exclamation"></i> 接続エラー</strong>
              データの取得に失敗しました。サービスID、APIキーが正しく設定されているか確認してください。
            </div>`;
        }
        
        const bbsContainer = document.getElementById('bbs-container');
        if (bbsContainer) {
          bbsContainer.innerHTML = `<p class="text-red-500 text-center text-xs py-12">エラー：データを取得できませんでした。</p>`;
        }
      }
    }

    function renderTimetable() {
      const container = document.getElementById('timetable-display');
      if (!container) return;
      container.innerHTML = '';

      const isThisWeek = (currentWeek === '今週');
      const imageUrl = isThisWeek ? timetableData.this_week_image?.url : timetableData.last_week_image?.url;
      const message = isThisWeek ? timetableData.this_week_message : timetableData.last_week_message;

      if (!imageUrl && !message) {
        container.innerHTML = `
          <div class="bg-white/15 backdrop-blur-xl border border-dashed border-stone-300 rounded-2xl p-12 text-center text-stone-400 animate-card shadow-sm">
            <i class="fa-solid fa-image silhouette-icon text-3xl mb-2 opacity-40"></i>
            <p class="text-xs">時間割が登録されていません</p>
          </div>`;
        return;
      }

      let html = '';

      if (imageUrl) {
        html += `
          <div class="bg-white/15 backdrop-blur-xl rounded-2xl border border-white/30 p-2 shadow-lg animate-card relative group overflow-hidden">
            <img src="${imageUrl}" alt="${currentWeek}の時間割" class="w-full h-auto object-contain max-h-[500px] rounded-lg" onclick="window.open('${imageUrl}')">
            
            <!-- iOSシステムUI風の半透明ガラスダウンロードボタン -->
            <button onclick="downloadImage('${imageUrl}', '${currentWeek}_時間割.png', this)" 
                    class="absolute bottom-4 right-4 bg-white/40 hover:bg-white/70 backdrop-blur-md border border-white/30 shadow-lg rounded-full w-10 h-10 flex items-center justify-center transition-all duration-200 active:scale-90"
                    title="画像をダウンロード">
              <i class="fa-solid fa-arrow-down silhouette-icon text-sm"></i>
            </button>
          </div>`;
      }

      if (message) {
        html += `
          <div class="bg-white/15 backdrop-blur-xl border border-white/30 rounded-2xl p-5 shadow-lg animate-card">
            <div class="text-[10px] text-stone-400 mb-2 uppercase font-bold tracking-widest border-b border-white/20 pb-1.5 flex items-center gap-1">
              <i class="fa-solid fa-pen-nib silhouette-icon text-xs"></i> 連絡事項
            </div>
            <p class="text-stone-700 text-sm whitespace-pre-wrap leading-relaxed">${message}</p>
          </div>`;
      }

      container.innerHTML = html;
    }

    function renderBBS() {
      const container = document.getElementById('bbs-container');
      if (!container) return;
      container.innerHTML = '';

      if (!announcementsData || announcementsData.length === 0) {
        container.innerHTML = '<p class="text-stone-400 italic text-center py-12 text-xs">新しい書き込みはありません。</p>';
        return;
      }

      announcementsData.forEach((ann) => {
        if (!ann.message && !ann.image) return;

        const dateStr = ann.publishedAt ? new Date(ann.publishedAt).toLocaleDateString('ja-JP') : '';

        const card = document.createElement('div');
        card.className = "bg-white/20 backdrop-blur-xl p-5 rounded-xl border border-white/35 space-y-3 shadow-md animate-card";
        
        let htmlContent = `
          <div class="flex items-center justify-between border-b border-white/20 pb-2">
            <span class="text-[10px] font-bold text-stone-500 uppercase tracking-wider flex items-center gap-1">
              <i class="fa-solid fa-bell silhouette-icon text-xs"></i> 掲示
            </span>
            <span class="text-[10px] text-stone-400">${dateStr}</span>
          </div>
          <p class="text-stone-700 whitespace-pre-wrap text-xs leading-relaxed">${ann.message || ''}</p>
        `;

        if (ann.image && ann.image.url) {
          htmlContent += `
            <div class="overflow-hidden rounded-lg border border-white/25 bg-stone-50/10 max-h-64 mt-2 relative group">
              <img src="${ann.image.url}" alt="添付画像" class="w-full h-full object-contain mx-auto hover:opacity-95 cursor-pointer" onclick="window.open('${ann.image.url}')">
              
              <button onclick="downloadImage('${ann.image.url}', '添付画像_${dateStr}.png', this)" 
                      class="absolute bottom-3 right-3 bg-white/45 hover:bg-white/75 backdrop-blur-md border border-white/35 shadow-lg rounded-full w-9 h-9 flex items-center justify-center transition-all duration-200 active:scale-90"
                      title="画像をダウンロード">
                <i class="fa-solid fa-arrow-down silhouette-icon text-xs"></i>
              </button>
            </div>
          `;
        }

        card.innerHTML = htmlContent;
        container.appendChild(card);
      });
    }

    initLiff();
  </script>
</body>
</html>
